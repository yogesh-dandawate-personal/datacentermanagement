name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        default: 'latest'

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run security scan
        run: |
          bandit -r backend/app -f json -o bandit-report.json || true
          # Check for high/medium severity issues
          if grep -q '"severity": "HIGH"' bandit-report.json; then
            echo "High severity security issue found!"
            cat bandit-report.json
            exit 1
          fi
          echo "Security scan passed"

  deploy:
    needs: security-check
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_API_URL }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build

      - name: Deploy backend to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN --org-id=$VERCEL_ORG_ID --project-id=$VERCEL_PROJECT_ID
          vercel build --token=$VERCEL_TOKEN --org-id=$VERCEL_ORG_ID --project-id=$VERCEL_PROJECT_ID
          vercel deploy --prod --prebuilt --token=$VERCEL_TOKEN --org-id=$VERCEL_ORG_ID --project-id=$VERCEL_PROJECT_ID

      - name: Deploy frontend to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_FRONTEND_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: |
          cd frontend
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN --org-id=$VERCEL_ORG_ID --project-id=$VERCEL_FRONTEND_PROJECT_ID
          vercel build --token=$VERCEL_TOKEN --org-id=$VERCEL_ORG_ID --project-id=$VERCEL_FRONTEND_PROJECT_ID
          vercel deploy --prod --prebuilt --token=$VERCEL_TOKEN --org-id=$VERCEL_ORG_ID --project-id=$VERCEL_FRONTEND_PROJECT_ID

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend && alembic upgrade head
          echo "Database migrations completed successfully"

      - name: Verify production deployment
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          sleep 15
          echo "Verifying production deployment..."
          for attempt in {1..5}; do
            if curl -s -f "$PRODUCTION_API_URL/api/organizations" > /dev/null 2>&1; then
              echo "✅ API is responding"
              break
            fi
            if [ $attempt -lt 5 ]; then
              echo "Attempt $attempt failed, retrying in 5 seconds..."
              sleep 5
            else
              echo "❌ API verification failed after 5 attempts"
              exit 1
            fi
          done

      - name: Smoke tests
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          echo "Running smoke tests..."
          # Test GET /api/organizations endpoint
          response=$(curl -s -w "\n%{http_code}" "$PRODUCTION_API_URL/api/organizations")
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" = "200" ] || [ "$http_code" = "401" ]; then
            echo "✅ API endpoint responding with HTTP $http_code"
          else
            echo "❌ API endpoint returned HTTP $http_code"
            exit 1
          fi

      - name: Post deployment notification
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: 'success',
              description: 'Production deployment successful'
            }).catch(err => console.log('Note: Deployment status update skipped'))

            core.notice('✅ Production deployment completed successfully!');

      - name: Post deployment notification on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            core.setFailed('Production deployment failed. Check logs above.');
