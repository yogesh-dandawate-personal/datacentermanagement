version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: netzero-postgres
    environment:
      POSTGRES_USER: netzero
      POSTGRES_PASSWORD: netzero_secure_pass_2024
      POSTGRES_DB: netzero
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netzero"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netzero-network
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netzero-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://netzero:netzero_secure_pass_2024@postgres:5432/netzero
      SECRET_KEY: A74AfhAJTrUv4LGdp4oiqy-ghnPU9Wh7e__tpQpphSM
      API_KEY: local-dev-key-change-in-production
      PYTHONUNBUFFERED: 1
      ENV: development
    volumes:
      - ./backend:/app
    networks:
      - netzero-network
    restart: unless-stopped
    command: >
      sh -c "
      python -m alembic upgrade head 2>/dev/null || echo 'No migrations' &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netzero-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - netzero-network
    restart: unless-stopped

networks:
  netzero-network:
    driver: bridge

volumes:
  postgres_data:
